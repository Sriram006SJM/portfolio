<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sriram Ganeshalingam — Data Analyst & ML Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ── Design Tokens ───────────────────────────────────────── */
    :root {
      --bg:       #0a0f1e;
      --bg2:      #0d1528;
      --bg3:      #111827;
      --teal:     #00d4ff;
      --teal-dim: rgba(0,212,255,0.12);
      --gold:     #f0c040;
      --gold-dim: rgba(240,192,64,0.12);
      --text:     #e2e8f0;
      --muted:    #8892b0;
      --border:   rgba(0,212,255,0.18);
      --radius:   12px;
      --font:     'Inter', sans-serif;
    }

    /* ── Reset & Base ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }
    a { color: var(--teal); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Utility ─────────────────────────────────────────────── */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .section { padding: 100px 0; }
    .section-title {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
    }
    .section-title span { color: var(--teal); }
    .section-line {
      width: 60px; height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--gold));
      border-radius: 2px;
      margin-bottom: 56px;
    }

    /* ── Fade-in animation ───────────────────────────────────── */
    .fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* ── Nav ─────────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(10,15,30,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-size: 1.1rem; font-weight: 700;
      background: linear-gradient(135deg, var(--teal), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      font-size: 0.875rem; font-weight: 500;
      color: var(--muted); transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--teal); text-decoration: none; }

    @media (max-width: 640px) { .nav-links { display: none; } }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="container nav-inner">
      <span class="nav-logo">SG.</span>
      <ul class="nav-links">
        <li><a href="#skills">Skills</a></li>
        <li><a href="#experience">Experience</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#education">Education</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- SECTIONS WILL BE ADDED IN SUBSEQUENT TASKS -->

  <script>
    // IntersectionObserver for fade-in
    const observer = new IntersectionObserver(
      (entries) => entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          e.target.querySelectorAll('.skill-fill').forEach(bar => {
            bar.style.width = getComputedStyle(bar).getPropertyValue('--w').trim();
          });
        }
      }),
      { threshold: 0.1 }
    );
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
</body>
</html>
